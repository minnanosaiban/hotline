site_name: ＥＮＥＯＳの内部通報制度に関する訴訟について
site_description: ENEOS（エネオス）の内部通報制度をめぐる訴訟の裁判文書を公開しています。通報を受けた後、通報者を情報から排除したうえ、裏づけのない情報を知らせて、不正の有無を伏せるという企業の対応について問題提起をしています。株主総会で問題提起します。
site_url: https://minnanosaiban.github.io/hotline/
site_dir: site

# mkdocs serve でも overrides/（テンプレート）の変更を検知してリロードする
watch:
  - overrides

# mkdocs serve --livereload 起動
# site_author: Mokeya
# copyright: Copyright &copy; 2025 ★★★

nav:
  - Home:
      - index.md
  - 裁判文書公開:
      - trial/index.md
      - <i class="bi bi-chevron-compact-right"></i> ＥＮＥＯＳの主張書面 : trial/eneos.md
      - <i class="bi bi-chevron-compact-right"></i> 通報者側の主張書面 : trial/whistleblower.md
      - <i class="bi bi-chevron-compact-right"></i> 判決書（水野有子裁判長） : trial/judgement_2025.md
      - <i class="bi bi-chevron-compact-right"></i> 主張書面全文と認否 <i class="bi bi-box-arrow-up-right"></i> : https://minnanosaiban.github.io/eneos-saiban/argument.html
  - 株価分析:
      - blog/index.md
      - <i class="fa-solid fa-layer-group"></i> 無料データを取得編:
          - 1-1 まず、「株価」を取得する: blog/posts/01-01_get_stock_prices.md
          - 1-2 決算データを無料で集める: blog/posts/01-02_collect_other_data.md
          - 1-3 決算 XBRL を JSON に変換: blog/posts/01-03_xbrl_to_json.md
          - 番外編 Note記事の下書きを作成: blog/posts/EX-03_kessan_note_app.md
      - <i class="fa-solid fa-layer-group"></i> 決算データで分析編:
          - 2-1 4象限で GARP を見る: blog/posts/02-01_garp_peg_roe.md
          - 2-2 マルチファクタースコア: blog/posts/02-02_multifactor_scoreboard.md
          - 2-3 アクルーアル分析: blog/posts/02-03_accrual_analysis.md
          - 2-4 コンセンサス予想を検証: blog/posts/02-04_triangulation.md
          - 2-5 セグメント分析 : blog/posts/02-05_segment_analysis.md
          - 2-6 コングロマリット・ディスカウント: blog/posts/02-06_segment_core_stocks.md
          - 2-7 CARで見る「決算の効き」 : blog/posts/02-07_narrative_car.md
          - 2-8 EVで見る「会社の値段」 : blog/posts/02-08_enterprise_value.md
      - <i class="fa-solid fa-layer-group"></i> 機械学習チャレンジ編:
          - 3-1 コサイン類似度: blog/posts/03-01_similar_earnings_search.md
          - 3-2 K-NN 分類: blog/posts/03-02_knn_prediction.md
          - 3-3 K-means クラスタリング: blog/posts/03-03_earnings_clustering.md
          - 3-4 ランダムフォレスト: blog/posts/03-04_random_forest.md
          - 3-5 階層型クラスタリング: blog/posts/03-05_price_clustering.md
          - 3-6 PCA 異常検知: blog/posts/03-06_price_anomaly.md
      - <i class="fa-solid fa-layer-group"></i> 用語集: blog/glossary.md

# 株価分析はタブバーには出さない（05-card.css 末尾の .md-tabs 非表示ルールで対応）。
# nav には残すことで、記事ページでのサイドバーツリー・前へ/次へ・パンくずは維持する。

# 整理中のため公開対象外（整理後に nav と index へ再追加する）
exclude_docs: |
  blog/posts/EX-01_intraday_stats.md
  blog/posts/EX-02_intraday_ml.md

extra_css:
  - css/01-color.css
  - css/02-layout.css
  - css/03-typeset.css
  - css/04-button.css
  - css/05-card.css
  - css/06-link-text.css
  - css/07-link-button.css
  - css/09-mobile-menu.css
  - css/10-blog-reset.css
  - css/11-trial.css
  - https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap
  - https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css

extra_javascript:
  - js/custom.js

theme:
  name: "material"
  language: ja # サイトの言語（<html lang="ja">・UIラベル・読み上げ）
  custom_dir: overrides # カスタマイズ用のディレクトリ
  logo: img/card1.png # サイト左上のアイコン
  favicon: img/favicon.png

  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: bootstrap/brightness-high
        name: ダークモードに切り替えます
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: bootstrap/moon-stars-fill
        name: ライトモードに切り替えます

  features:
    - content.code.annotate # コードブロック内の注釈
    - content.code.copy # コードブロックの「コピー」ボタン
    - content.code.select # コードブロックの範囲選択機能
    - content.footnote.tooltips # 脚注をツールチップとして表示
    - content.tabs.link # タブ間のリンクを有効化
    - content.tooltips # ツールチップ（補足説明のポップアップ）を有効化
    - navigation.tabs # タブ形式のナビゲーション
    - navigation.tabs.sticky # タブ形式のナビゲーションをスクロールしても上部に固定
    - navigation.expand # ナビゲーションメニューを最初からすべて展開
    - navigation.top # トップへ戻るボタン
    - navigation.indexes # index.md を含むディレクトリをナビゲーションの親として扱う
    - navigation.expand # ナビゲーションメニューを最初からすべて展開
    - navigation.sections # 折りたたまずに全てフラットに表示
    
    # - announce.dismiss # アナウンスバーを表示
    # - content.action.edit # 「編集」ボタンを表示
    # - content.action.view # 「ソースを表示」ボタン
    # - content.code.annotate # コードブロック内の注釈
    # - content.code.copy # コードブロックの「コピー」ボタン
